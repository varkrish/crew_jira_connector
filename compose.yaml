# Full stack: Crew backend + frontend (Quay) + Jira connector
# Compatible with: podman-compose, docker compose
#
# Usage:
#   podman compose up -d              # start all
#   podman compose up -d --build      # rebuild connector only, start all
#   podman compose logs -f
#   podman compose down
#
# Backend and frontend use quay.io/varkrish images; connector builds locally or use image.

services:
  backend:
    image: quay.io/varkrish/crew-backend:latest
    container_name: crew-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - crew-workspace:/app/workspace
      - crew-data:/app/data
      - ${CONFIG_FILE:-./config.yaml}:/app/config.yaml:ro,z
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - WORKSPACE_PATH=/app/workspace
      - JOB_DB_PATH=/app/data/crew_jobs.db
      - CONFIG_FILE_PATH=/app/config.yaml
      - FLASK_ENV=${FLASK_ENV:-production}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - crew-net

  frontend:
    image: quay.io/varkrish/crew-frontend:latest
    container_name: crew-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - crew-net

  connector:
    image: crew-jira-connector:latest
    build:
      context: .
      dockerfile: Containerfile
    container_name: crew-jira-connector
    ports:
      - "${CONNECTOR_PORT:-8082}:8080"
    environment:
      - CREW_STUDIO_URL=http://backend:8080
      - JIRA_BACKEND=${JIRA_BACKEND:-rest}
      - JIRA_BASE_URL=${JIRA_BASE_URL:-}
      - JIRA_EMAIL=${JIRA_EMAIL:-}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      - JIRA_USERNAME=${JIRA_USERNAME:-}
      - JIRA_PASSWORD=${JIRA_PASSWORD:-}
      - JIRA_PROJECT_KEYS=${JIRA_PROJECT_KEYS:-}
      - JIRA_TRIGGER_STATUS=${JIRA_TRIGGER_STATUS:-Ready for Dev}
      - JIRA_WEBHOOK_SECRET=${JIRA_WEBHOOK_SECRET:-}
      - LLM_API_BASE_URL=${LLM_API_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - PYTHONUNBUFFERED=1
    volumes:
      - connector-data:/app/data
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - crew-net

volumes:
  crew-workspace:
    driver: local
  crew-data:
    driver: local
  connector-data:
    driver: local

networks:
  crew-net:
    driver: bridge
