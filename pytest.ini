[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests (fast, no external dependencies)
    api: API endpoint tests (FastAPI test client)
    e2e: End-to-end tests (requires mocked Crew Studio)
    bdd: BDD feature file tests
addopts = -v --strict-markers --tb=short -ra
timeout = 60
